<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cookora Admin Analytics</title>
  <style>
    :root{--ink:#121222;--cream:#fbf0dc;--yellow:#ffdf00;--pink:#ff5c9f;--cyan:#58d3d1;--green:#80d91f;--dark:#17172f;--white:#fffaf0;--border:3px solid var(--ink);--shadow:6px 6px 0 var(--ink)}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,Segoe UI,sans-serif;background:var(--cream);color:var(--ink)}
    header{padding:18px 22px;background:var(--yellow);border-bottom:var(--border);display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center} h1,h2{margin:0;letter-spacing:-.04em} a{color:inherit;font-weight:900}
    main{padding:22px;max-width:1200px;margin:auto}.panel,.card,table{background:var(--white);border:var(--border);border-radius:16px;box-shadow:var(--shadow)}.panel{padding:16px;margin-bottom:20px}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}.card{padding:16px}.card b{font-size:2rem;display:block}.card:nth-child(1){background:var(--cyan)}.card:nth-child(2){background:var(--green)}.card:nth-child(3){background:var(--pink)}.card:nth-child(4){background:var(--yellow)}.card:nth-child(5){background:#a85cf9;color:#fff}
    input,button{font:inherit;border:var(--border);border-radius:12px;padding:12px}button{background:var(--pink);font-weight:1000;box-shadow:4px 4px 0 var(--ink);cursor:pointer}.row{display:flex;gap:10px;flex-wrap:wrap}.row input{flex:1;min-width:220px}.lists{display:grid;grid-template-columns:.8fr 1.2fr;gap:18px}ol{margin:10px 0 0;padding-left:24px}li{margin:8px 0;font-weight:700}table{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden}th,td{padding:10px;border-bottom:2px solid var(--ink);vertical-align:top;font-size:.9rem}th{background:var(--dark);color:#fff;text-align:left}code{word-break:break-all}.muted{opacity:.7}@media(max-width:850px){.grid,.lists{grid-template-columns:1fr}table{display:block;overflow:auto}}
  </style>
</head>
<body>
<header><h1>🍳 Cookora Admin</h1><a href="/">← Buka Web</a></header>
<main>
  <section class="panel">
    <h2>Analytics Visitor & Search</h2>
    <p>Masukkan <b>ADMIN_KEY</b> ya Pajar, ini khusus Pajar awoakkwk👎</p>
    <div class="row">
      <input id="key" type="password" placeholder="ADMIN_KEY..." />
      <button id="load">Load Analytics</button>
    </div>
    <p id="status" class="muted"></p>
  </section>

  <section id="summary" class="grid"></section>

  <section class="lists">
    <div class="panel">
      <h2>Top Search</h2>
      <ol id="topSearches"></ol>
    </div>
    <div class="panel">
      <h2>Event Terbaru</h2>
      <div id="events"></div>
    </div>
  </section>
</main>
<script>
const $=s=>document.querySelector(s);
function esc(v=''){return String(v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
async function load(){
  const key=$('#key').value.trim();
  localStorage.setItem('cookoraAdminKey',key);
  $('#status').textContent='Memuat...';
  try{
    const r=await fetch('/api/analytics?limit=1000&key='+encodeURIComponent(key));
    const p=await r.json();
    if(!r.ok||!p.success) throw new Error(p.error||'Gagal load analytics');
    const s=p.summary;
    $('#summary').innerHTML=`
      <div class="card"><span>Events</span><b>${s.totalEvents}</b></div>
      <div class="card"><span>Visitors</span><b>${s.uniqueVisitors}</b></div>
      <div class="card"><span>Pageviews</span><b>${s.pageviews}</b></div>
      <div class="card"><span>Searches</span><b>${s.searches}</b></div>
      <div class="card"><span>Detail</span><b>${s.detailOpens}</b></div>`;
    $('#topSearches').innerHTML=(s.topSearches||[]).map(x=>`<li>${esc(x.query)} <b>(${x.count})</b></li>`).join('')||'<li>Belum ada search</li>';
    $('#events').innerHTML=`<table><thead><tr><th>Waktu</th><th>Type</th><th>Visitor/IP</th><th>Data</th></tr></thead><tbody>${(p.events||[]).slice(0,100).map(e=>`<tr><td>${esc(e.time)}</td><td><b>${esc(e.type)}</b></td><td><code>${esc(e.visitorId||e.ip||'-')}</code></td><td><code>${esc(e.query||e.url||e.page||e.path||'-')}</code><br><span class="muted">${esc(e.userAgent||'')}</span></td></tr>`).join('')}</tbody></table>`;
    $('#status').textContent='Berhasil dimuat.';
  }catch(e){$('#status').textContent=e.message}
}
$('#key').value=localStorage.getItem('cookoraAdminKey')||'';
$('#load').onclick=load;
if($('#key').value) load();
</script>
</body>
</html>
